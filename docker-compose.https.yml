services:
  caddy:
    image: caddy:2.8-alpine
    container_name: akys-caddy
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    environment:
      - MEDEK_DOMAIN=${MEDEK_DOMAIN:-localhost}
    ports:
      - "${MEDEK_HTTP_PORT:-80}:80"
      - "${MEDEK_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - medek_caddy_data:/data
      - medek_caddy_config:/config
    restart: unless-stopped

volumes:
  medek_caddy_data:
  medek_caddy_config:
